name: Build Desktop App

on:
  workflow_dispatch:

jobs:
  build-mac:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: desktop-app

      - name: Build
        run: npx tsc && npx vite build && npx electron-builder --mac
        working-directory: desktop-app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mac
          path: desktop-app/dist/*.dmg
          retention-days: 14

  build-linux-win:
    name: Linux + Windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wine (for Windows NSIS installer)
        run: sudo apt-get install -y wine64

      - name: Install dependencies
        run: npm install
        working-directory: desktop-app

      - name: Build
        run: npm run build:all
        working-directory: desktop-app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            desktop-app/dist/*.AppImage
            desktop-app/dist/*.deb
          retention-days: 14

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: desktop-app/dist/*.exe
          retention-days: 14
