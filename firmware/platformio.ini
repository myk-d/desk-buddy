; ╔══════════════════════════════════════════════════════╗
; ║         Gaze Buddy — PlatformIO Config               ║
; ║         ESP32-S3 N16R8 (16MB Flash + 8MB PSRAM)     ║
; ╚══════════════════════════════════════════════════════╝

[env:esp32-s3-devkitc-1]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; ── Вручну описуємо N16R8 через board_build ──────────────
; PlatformIO не має окремого профілю N16R8,
; тому перевизначаємо всі параметри пам'яті напряму
board_upload.flash_size         = 16MB
board_upload.maximum_size       = 16777216
board_build.arduino.memory_type = qio_opi
board_build.f_flash             = 80000000L
board_build.f_cpu               = 240000000L
board_build.partitions          = default_16MB.csv

; ── PSRAM через sdkconfig ─────────────────────────────────
board_build.sdkconfig = sdkconfig.defaults

; ── Build flags ───────────────────────────────────────────
build_flags =
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_USE_CAPS_ALLOC=y
    -DCORE_DEBUG_LEVEL=0
    -O2
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1

; ── Бібліотеки ───────────────────────────────────────────
lib_deps =
    lovyan03/LovyanGFX @ ^1.1.12
    adafruit/Adafruit NeoPixel @ ^1.12.4

upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
upload_speed = 921600
upload_flags = --before=usb_reset

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, send_on_enter
monitor_eol = LF